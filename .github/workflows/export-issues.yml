name: Export Issues CSV (Manual) # updated

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Issues
        run: |
          curl -H "Accept: application/vnd.github+json" \
               -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               https://api.github.com/repos/${{ github.repository }}/issues \
               -o issues.json

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create CSV
        run: |
          echo "number,title,state,created_at" > issues.csv
          jq -r '.[] | [.number, .title, .state, .created_at] | @csv' issues.json >> issues.csv || true

      - name: Show Files (Debug)
        run: ls -la

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: exported-issues
          path: issues.csv

name: CI with Jira Ticket

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Test Failure
        run: |
          echo "Running tests..."
          exit 1

      - name: Create Jira Ticket if CI fails
        if: failure()
        env:
          JIRA_BASE_URL: https://gighat.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: GIG
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |

          DESCRIPTION="CI pipeline failed.

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}

          GitHub Run: $RUN_URL
          Commit: ${{ github.sha }}"

          curl -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": {\"key\": \"$JIRA_PROJECT_KEY\"},
                \"summary\": \"🚨 CI Pipeline Failed - ${{ github.repository }}\",
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"$DESCRIPTION\"
                    }]
                  }]
                },
                \"issuetype\": {\"name\": \"Task\"}
              }
            }" \
            $JIRA_BASE_URL/rest/api/3/issue

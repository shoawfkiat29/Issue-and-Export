name: CI Failure Incident Creator

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Tests
        id: test_step
        run: |
          echo "Running CI tests..."
          exit 1
        continue-on-error: true

      - name: Create Incident Issue
        if: steps.test_step.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const runId = context.runId;
            const branch = context.ref.replace("refs/heads/", "");
            const commit = context.sha;
            const actor = context.actor;

            const issueBody =
              "## 🚨 CI Pipeline Failure\n\n" +
              "**Repository:** " + repo + "\n" +
              "**Branch:** " + branch + "\n" +
              "**Commit:** " + commit + "\n" +
              "**Triggered by:** " + actor + "\n" +
              "**Run ID:** " + runId + "\n\n" +

              "### 🔎 Failure Details\n" +
              "The CI workflow failed during execution.\n\n" +

              "### 📜 Logs\n" +
              "View detailed logs here:\n" +
              "https://github.com/" + owner + "/" + repo + "/actions/runs/" + runId + "\n\n" +

              "### 🛠 Recommended Investigation Steps\n" +
              "- Check CI logs\n" +
              "- Review failing tests\n" +
              "- Verify recent commits\n\n" +

              "### 🤖 Generated Automatically\n" +
              "This issue was created automatically by the CI workflow.";

            const issue = await github.rest.issues.create({
              owner: owner,
              repo: repo,
              title: "🚨 CI Pipeline Failed",
              body: issueBody,
              labels: ["ci-failure", "bug", "automation"]
            });

            console.log("Incident issue created:", issue.data.html_url);

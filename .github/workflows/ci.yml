name: CI with Auto Issue + Sub Issues

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Force Failure (Test)
        id: test_step
        run: |
          echo "Testing failure..."
          exit 1
        continue-on-error: true

      # Step 1: Check if CI issue already exists
      - name: Check existing CI issue
        id: check_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ci-failure"
            });

            return issues.data.length > 0;

      # Step 2: Create Parent Issue
      - name: Create Parent Issue
        id: create_parent
        if: steps.test_step.outcome == 'failure' && steps.check_issue.outputs.result == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const parentIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 CI Failed Automatically",
              body: `CI workflow failed.

Repository: ${context.repo.repo}
Branch: ${context.ref}
Run ID: ${context.runId}

Logs:
https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

Sub-tasks will be created automatically.`,
              labels: ["bug", "ci-failure"]
            });

            core.setOutput("parent_number", parentIssue.data.number);

      # Step 3: Create Sub Issues
      - name: Create Sub Issues
        if: steps.create_parent.outputs.parent_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const parentNumber = "${{ steps.create_parent.outputs.parent_number }}";

            const subTasks = [
              "🔍 Investigate failing logs",
              "🛠 Fix broken test cases",
              "✅ Re-run CI and verify",
              "📦 Deploy updated build"
            ];

            let taskList = "## Sub Tasks\n";

            for (const task of subTasks) {
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: task,
                body: `Auto-generated sub issue for parent #${parentNumber}`,
                labels: ["ci-subtask"]
              });

              taskList += `- [ ] #${subIssue.data.number}\n`;
            }

            // Update parent issue with checklist
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: `🚨 CI workflow failed.

Parent Issue: #${parentNumber}

${taskList}`
            });

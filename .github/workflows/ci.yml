name: CI Auto Issue Test

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Failure (Test)
        id: test_step
        run: |
          echo "Testing failure..."
          exit 1
        continue-on-error: true

      - name: Create Issue if Failed
        if: steps.test_step.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const body =
              "Workflow failed.\n\n" +
              "Repository: " + context.repo.repo + "\n" +
              "Branch: " + context.ref + "\n" +
              "Run ID: " + context.runId + "\n\n" +
              "Check logs:\n" +
              "https://github.com/" +
              context.repo.owner + "/" +
              context.repo.repo +
              "/actions/runs/" + context.runId;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 CI Failed Automatically",
              body: body,
              labels: ["bug", "ci-failure"]
            });

            console.log("Issue created:", issue.data.html_url);
